services:

  # ── Python FastAPI backend ──────────────────────────────────────────────────
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      # Required
      - GROQ_API_KEY=${GROQ_API_KEY}
      # Optional — blank → SQLite / in-memory cache
      - DATABASE_URL=${DATABASE_URL:-}
      - UPSTASH_REDIS_URL=${UPSTASH_REDIS_URL:-}
      - UPSTASH_REDIS_TOKEN=${UPSTASH_REDIS_TOKEN:-}
      - PAGESPEED_API_KEY=${PAGESPEED_API_KEY:-}
      # Internal security key shared with Mastra
      - INTERNAL_SECRET_KEY=${INTERNAL_SECRET_KEY:-dev-internal-key-change-in-prod}
      # Tell Python where Mastra lives (Docker service name resolves internally)
      - MASTRA_URL=http://mastra:4111
    volumes:
      - ./shopos.db:/app/shopos.db
      - ./output:/app/output
      - ./demo:/app/demo
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s


volumes:
