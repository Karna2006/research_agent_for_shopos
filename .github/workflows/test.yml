name: Test Suite

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      GROQ_API_KEY: test-key-ci
      DATABASE_URL: ""          # force SQLite in tests
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      # Playwright is NOT installed in CI — scraper integration tests are
      # marked @pytest.mark.slow and excluded from the CI run.

      - name: Run tests (excluding slow / Playwright tests)
        run: |
          pytest tests/ -v --tb=short -m "not slow" \
            --asyncio-mode=auto \
            -p no:warnings

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/
          if-no-files-found: ignore
